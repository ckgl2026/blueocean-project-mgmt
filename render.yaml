services:
  - type: web
    name: blueocean-project-mgmt
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx drizzle-kit migrate
    startCommand: NODE_ENV=production node dist/boot.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: blueocean-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_KIMI_AUTH_URL
        value: https://kimi-auth-url-placeholder
      - key: VITE_APP_ID
        value: app-id-placeholder
      - key: VITE_APP_SECRET
        generateValue: true
      - key: KIMI_APP_SECRET
        generateValue: true

databases:
  - name: blueocean-db
    plan: free
    databaseName: blueocean
    user: blueocean
